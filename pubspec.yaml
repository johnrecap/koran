name: quran_kareem
description: "القرآن الكريم — النسخة الفاخرة"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.4.4 <4.0.0'

dependencies:
  cached_network_image: ^3.4.1
  flutter:
    sdk: flutter
  fl_chart: ^0.68.0
  flutter_compass: ^0.8.1
  flutter_localizations:
    sdk: flutter
  flutter_local_notifications: ^21.0.0
  flutter_riverpod: ^2.6.1
  flutter_timezone: ^5.0.2
  flutter_svg: ^2.1.0
  google_generative_ai: ^0.4.0
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  go_router: ^15.1.2
  google_fonts: 8.0.0
  http: ^1.6.0
  intl: 0.20.2
  just_audio: ^0.10.5
  connectivity_plus: ^7.0.0
  path: ^1.9.0
  path_provider: ^2.1.5
purchases_flutter: ^9.15.1
  quran_library:
    path: packages/quran_library
  sentry_flutter: ^8.14.2
  share_plus: ^12.0.1
  shared_preferences: ^2.3.3
  sqflite: ^2.3.3+1
  timezone: ^0.11.0
  uuid: ^4.5.1
  video_player: ^2.10.0
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/db/
    - assets/stories/
    - assets/adhkar/
    - assets/data/word_meanings/
    - assets/data/asbaab_nuzul/
    - assets/data/related_ayahs/
    - assets/images/
    - assets/topics/
    - assets/fonts/
    - assets/videos/
  fonts:
    - family: KFGQPC Uthmanic Script HAFS
      fonts:
        - asset: assets/fonts/KFGQPC Uthmanic Script HAFS.otf
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
        - asset: assets/fonts/Amiri-Italic.ttf
          style: italic
        - asset: assets/fonts/Amiri-BoldItalic.ttf
          weight: 700
          style: italic
    - family: ScheherazadeNew
      fonts:
        - asset: assets/fonts/ScheherazadeNew-Regular.ttf
        - asset: assets/fonts/ScheherazadeNew-Medium.ttf
          weight: 500
        - asset: assets/fonts/ScheherazadeNew-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/ScheherazadeNew-Bold.ttf
          weight: 700
